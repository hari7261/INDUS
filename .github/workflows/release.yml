# ============================================================
#  INDUS Terminal – GitHub Actions Release Workflow
#
#  Triggers when you push a tag like:  git tag v1.2.0 && git push --tags
#
#  What it does:
#    1. Builds indus.exe (Windows 64-bit)
#    2. Compiles indus-setup.exe (Inno Setup installer)
#    3. Creates a GitHub Release with both files attached
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"          # matches v1.0.0, v2.3.1, etc.

permissions:
  contents: write         # needed to create releases and upload assets

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    env:
      WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
      WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe works

      # ── 2. Set up Go ───────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # ── 3. Parse version from tag ──────────────────────────────────────
      - name: Parse version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"       # e.g. v1.2.3
          VER="${TAG#v}"                  # strip leading v → 1.2.3
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VER"      >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"    >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Resolve signing mode
        id: signing_mode
        shell: powershell
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_BASE64) -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_PASSWORD)
          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Code signing enabled."
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "::warning::Code signing disabled (missing WINDOWS_SIGN_PFX_BASE64 or WINDOWS_SIGN_PFX_PASSWORD). Releasing unsigned artifacts."
          }

      # ── 4. Install rsrc (icon embedder) ───────────────────────────────
      - name: Install rsrc
        run: go install github.com/akavel/rsrc@latest

      # ── 5. Embed icon into .syso ───────────────────────────────────────
      - name: Embed icon
        shell: cmd
        run: |
          if not exist build\icon.ico (
            echo "Missing build\\icon.ico"
            exit /b 1
          )
          rsrc -ico build\icon.ico -o cmd\indus-terminal\rsrc.syso
          if not exist cmd\indus-terminal\rsrc.syso (
            echo "Icon embed failed: cmd\\indus-terminal\\rsrc.syso not found"
            exit /b 1
          )

      # ── 6. Build indus.exe ─────────────────────────────────────────────
      - name: Build binary
        shell: cmd
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          if not exist dist mkdir dist
          go build ^
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ steps.version.outputs.commit }} -X main.buildTime=${{ steps.version.outputs.build_time }}" ^
            -o dist\ind.exe ^
            .\cmd\indus-terminal
          copy /Y dist\ind.exe dist\indus.exe >nul
          if not exist dist\ind.exe (
            echo "Binary build failed: dist\\ind.exe not found"
            exit /b 1
          )
          if not exist dist\indus.exe (
            echo "Alias build failed: dist\\indus.exe not found"
            exit /b 1
          )

      - name: Run unit tests
        shell: powershell
        run: go test ./...

      - name: Smoke test native commands
        shell: powershell
        run: |
          .\scripts\release_smoke.ps1 -BinaryPath "$pwd\dist\ind.exe" -ReportDir "$pwd\dist"

      # ── 6.1 Prepare code-sign certificate ──────────────────────────────
      - name: Prepare code-sign cert
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "indus-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          "INDUS_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 6.2 Sign binaries ───────────────────────────────────────────────
      - name: Sign binaries
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          }
          if (-not $signtool) {
            throw "signtool.exe not found on runner"
          }
          $toolPath = if ($signtool.Source) { $signtool.Source } else { $signtool.FullName }
          $timestamp = "http://timestamp.digicert.com"
          & $toolPath sign /fd SHA256 /f "$env:INDUS_PFX_PATH" /p "$env:WINDOWS_SIGN_PFX_PASSWORD" /tr $timestamp /td SHA256 "dist\ind.exe"
          & $toolPath sign /fd SHA256 /f "$env:INDUS_PFX_PATH" /p "$env:WINDOWS_SIGN_PFX_PASSWORD" /tr $timestamp /td SHA256 "dist\indus.exe"

      # ── 7. Install Inno Setup ──────────────────────────────────────────
      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup --yes --no-progress

      # ── 8. Compile installer ───────────────────────────────────────────
      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\indus-setup.iss
          if not exist dist\indus-setup.exe (
            echo "Installer build failed!"
            exit /b 1
          )

      # ── 9. Rename installer to include version ─────────────────────────
      - name: Rename installer
        shell: cmd
        run: |
          rename dist\indus-setup.exe indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe

      # ── 9.1 Sign installer ──────────────────────────────────────────────
      - name: Sign installer
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          }
          if (-not $signtool) {
            throw "signtool.exe not found on runner"
          }
          $toolPath = if ($signtool.Source) { $signtool.Source } else { $signtool.FullName }
          $timestamp = "http://timestamp.digicert.com"
          & $toolPath sign /fd SHA256 /f "$env:INDUS_PFX_PATH" /p "$env:WINDOWS_SIGN_PFX_PASSWORD" /tr $timestamp /td SHA256 "dist\indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe"

      # ── 10. Generate SHA-256 checksums ────────────────────────────────
      - name: Verify Authenticode signatures
        if: ${{ steps.signing_mode.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $files = @(
            "dist\ind.exe",
            "dist\indus.exe",
            "dist\indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe"
          )
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature $f
            if ($sig.Status -ne "Valid") {
              throw "Signature invalid for $f: $($sig.Status) - $($sig.StatusMessage)"
            }
          }

      - name: Generate checksums
        shell: powershell
        run: |
          $files = @(
            "dist\ind.exe",
            "dist\indus.exe",
            "dist\indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe"
          )
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            "$hash  $(Split-Path $f -Leaf)"
          }
          $lines | Set-Content dist\checksums.txt
          Get-Content dist\checksums.txt

      # ── 11. Create GitHub Release ──────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "INDUS Terminal ${{ steps.version.outputs.tag }}"
          body: |
            ## INDUS Terminal ${{ steps.version.outputs.tag }}

            ### Install
            1. Download **indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe**
            2. Run it — the wizard will install INDUS and add it to your PATH
            3. Open a new terminal and type `ind` (or `indus`) — or use the **INDUS Terminal** desktop shortcut

            ### Manual install (no wizard)
            Download `ind.exe`, place it anywhere in your PATH, and run it.

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for details.

            ---
            **Build info**
            | | |
            |---|---|
            | Version | `${{ steps.version.outputs.version }}` |
            | Commit  | `${{ steps.version.outputs.commit }}` |
            | Built   | `${{ steps.version.outputs.build_time }}` |
          files: |
            dist/indus-setup-${{ steps.version.outputs.tag }}-windows-amd64.exe
            dist/ind.exe
            dist/indus.exe
            dist/checksums.txt
            dist/smoke-summary.txt
            dist/smoke-report.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

